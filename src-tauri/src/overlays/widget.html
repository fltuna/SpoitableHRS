<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(.95)}45%{transform:scale(1.08)}}
.widget{width:340px;padding:12px 16px;background:rgba(26,26,46,.92);border-radius:10px;border:1px solid rgba(58,134,255,.2)}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.brand{font-size:11px;color:#555;font-weight:500}
.hr{display:flex;align-items:center;gap:8px}
.heart{font-size:18px;color:#e74c6f;animation:heartbeat .85s ease-in-out infinite}
.bpm{font-size:28px;font-weight:700;color:#eee;font-variant-numeric:tabular-nums}
.unit{font-size:12px;color:#888}
.graph{height:52px;overflow:hidden;border-radius:4px}
.graph canvas{width:100%;height:100%;display:block}
.bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:10px}
.zone{font-weight:600;text-transform:uppercase}
.stats{color:#555}
.stats b{color:#aaa;font-weight:600}
</style></head><body>
<div class="widget">
  <div class="top">
    <span class="brand">SpoitableHRS</span>
    <div class="hr">
      <span class="heart">&#9829;</span>
      <span class="bpm" id="bpm">--</span>
      <span class="unit">BPM</span>
    </div>
  </div>
  <div class="graph"><canvas id="cv"></canvas></div>
  <div class="bot">
    <span class="zone" id="zone" style="color:#2ecc71">Rest Zone</span>
    <span class="stats">avg:<b id="avg">--</b> min:<b id="min">--</b> max:<b id="max">--</b></span>
  </div>
</div>
<script>
const hist=[];const MAX=60;
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
function draw(){const r=cv.parentElement.getBoundingClientRect();cv.width=r.width*devicePixelRatio;cv.height=r.height*devicePixelRatio;
ctx.clearRect(0,0,cv.width,cv.height);if(hist.length<2)return;
const mn=Math.min(...hist)-3,mx=Math.max(...hist)+3,rng=mx-mn;
const g=ctx.createLinearGradient(0,0,0,cv.height);g.addColorStop(0,'rgba(58,134,255,.12)');g.addColorStop(1,'rgba(58,134,255,.02)');
ctx.strokeStyle='#3a86ff';ctx.lineWidth=1.5*devicePixelRatio;ctx.lineJoin='round';ctx.beginPath();
const s=cv.width/(MAX-1),o=MAX-hist.length;
hist.forEach((v,i)=>{const x=(o+i)*s,y=cv.height-((v-mn)/rng)*cv.height;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
ctx.stroke();ctx.lineTo((o+hist.length-1)*s,cv.height);ctx.lineTo(o*s,cv.height);ctx.closePath();ctx.fillStyle=g;ctx.fill()}
const zones={rest:{l:'Rest Zone',c:'#2ecc71'},light:{l:'Light Zone',c:'#3a86ff'},moderate:{l:'Moderate Zone',c:'#f39c12'},hard:{l:'Hard Zone',c:'#e74c3c'}};
const p=new URLSearchParams(location.search),port=p.get('port')||location.port||'9100';
let ws;function connect(){ws=new WebSocket(`ws://${location.hostname||'localhost'}:${port}/ws`);
ws.onmessage=e=>{const d=JSON.parse(e.data);
if(d.bpm!==undefined){document.getElementById('bpm').textContent=d.bpm;hist.push(d.bpm);if(hist.length>MAX)hist.shift();draw()}
if(d.zone&&zones[d.zone]){const z=zones[d.zone];document.getElementById('zone').textContent=z.l;document.getElementById('zone').style.color=z.c}
if(d.avg!==undefined){document.getElementById('avg').textContent=d.avg;document.getElementById('min').textContent=d.min;document.getElementById('max').textContent=d.max}
if(d.type==='welcome'){if(d.history){hist.push(...d.history);while(hist.length>MAX)hist.shift();draw()}
if(d.avg!==undefined){document.getElementById('avg').textContent=d.avg;document.getElementById('min').textContent=d.min;document.getElementById('max').textContent=d.max}}};
ws.onclose=()=>setTimeout(connect,2000)}connect();
</script></body></html>
