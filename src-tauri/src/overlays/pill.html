<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(.95)}45%{transform:scale(1.08)}}
.pill{display:inline-flex;align-items:center;gap:10px;padding:10px 20px 10px 16px;background:rgba(26,26,46,.9);border-radius:28px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(12px)}
.heart{font-size:22px;color:#e74c6f;animation:heartbeat .85s ease-in-out infinite}
.bpm{font-size:26px;font-weight:700;color:#eee;font-variant-numeric:tabular-nums}
.label{font-size:12px;color:#888;letter-spacing:.05em}
.hidden{display:none}
</style></head><body>
<div class="pill" id="pill">
  <span class="heart">&#9829;</span>
  <span class="bpm" id="bpm">--</span>
  <span class="label">BPM</span>
</div>
<script>
const p=new URLSearchParams(location.search),port=p.get('port')||location.port||'9100';
let ws;function connect(){ws=new WebSocket(`ws://${location.hostname||'localhost'}:${port}/ws`);
ws.onmessage=e=>{const d=JSON.parse(e.data);if(d.bpm!==undefined)document.getElementById('bpm').textContent=d.bpm;
if(d.type==='welcome'&&d.bpm)document.getElementById('bpm').textContent=d.bpm};
ws.onclose=()=>setTimeout(connect,2000)}connect();
</script></body></html>
