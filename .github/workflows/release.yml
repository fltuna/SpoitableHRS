name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Find and read artifacts
        id: artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bundleDir = "src-tauri/target/release/bundle/nsis"

          Write-Host "=== Bundle directory contents ==="
          Get-ChildItem -Path $bundleDir -Recurse | ForEach-Object { Write-Host $_.FullName }

          $nsisExe = Get-ChildItem -Path $bundleDir -Filter "*.exe" | Select-Object -First 1
          $nsisZip = Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip" | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path $bundleDir -Filter "*.nsis.zip.sig" | Select-Object -First 1

          if (-not $nsisExe) { Write-Error "No exe found"; exit 1 }

          Write-Output "nsis_exe=$($nsisExe.FullName)" >> $env:GITHUB_OUTPUT

          if ($nsisZip) {
            Write-Output "nsis_zip=$($nsisZip.FullName)" >> $env:GITHUB_OUTPUT
            Write-Output "zip_name=$($nsisZip.Name)" >> $env:GITHUB_OUTPUT
            Write-Host "Found zip: $($nsisZip.Name)"
          }

          if ($nsisSig) {
            Write-Output "nsis_sig=$($nsisSig.FullName)" >> $env:GITHUB_OUTPUT
            $sig = Get-Content $nsisSig.FullName -Raw
            Write-Output "sig=$($sig.Trim())" >> $env:GITHUB_OUTPUT
            Write-Host "Found sig: $($nsisSig.Name)"
          } else {
            Write-Host "WARNING: No .sig file found"
            Write-Output "sig=" >> $env:GITHUB_OUTPUT
          }

          Write-Host "Found exe: $($nsisExe.Name)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SpoitableHRS v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.nsis_exe }}
            ${{ steps.artifacts.outputs.nsis_zip }}
            ${{ steps.artifacts.outputs.nsis_sig }}

      - name: Update CFW KV with latest version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SIG="${{ steps.artifacts.outputs.sig }}"
          ZIP_NAME="${{ steps.artifacts.outputs.zip_name }}"
          DOWNLOAD_URL="https://github.com/fltuna/SpoitableHRS/releases/download/v${VERSION}/${ZIP_NAME}"

          npx wrangler kv key put \
            --namespace-id 44b426708e1f42b1aac00e082ec40de5 \
            "latest" \
            "{\"version\":\"${VERSION}\",\"notes\":\"Release v${VERSION}\",\"pub_date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"platforms\":{\"windows-x86_64\":{\"url\":\"${DOWNLOAD_URL}\",\"signature\":\"${SIG}\"}}}"
