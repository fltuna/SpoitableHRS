<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpoitableHRS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="titlebar" id="titlebar">
    <span class="titlebar-title">SpoitableHRS</span>
    <div class="titlebar-buttons">
      <button class="titlebar-btn" id="minimizeBtn">&#x2013;</button>
      <button class="titlebar-btn titlebar-close" id="closeBtn">&#x2715;</button>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="main">Monitor</button>
      <button class="tab" data-tab="osc">OSC</button>
      <button class="tab" data-tab="settings">Settings</button>
      <button class="tab" data-tab="log">Log</button>
    </div>

    <div class="tab-content active" id="tab-main">
      <div class="hr-display">
        <div class="hr-icon" id="heart">&#9829;</div>
        <div class="hr-value"><span id="bpm">--</span></div>
        <div class="hr-label">BPM</div>
      </div>

      <div class="hr-graph">
        <canvas id="hrCanvas"></canvas>
      </div>

      <div class="controls">
        <div class="section">
          <button id="scanConnectBtn" class="btn btn-primary">Scan &amp; Connect</button>
        </div>
      </div>

    <div class="modal-overlay" id="deviceModal">
      <div class="modal">
        <div class="modal-header">
          <span>Select Device</span>
          <button class="modal-close" id="modalCloseBtn">&#x2715;</button>
        </div>
        <div class="modal-body" id="deviceListBody">
          <div class="modal-scanning">Scanning...</div>
        </div>
      </div>
    </div>
    </div>

    <div class="tab-content" id="tab-osc">
      <div class="settings-scroll">
        <div class="settings-section">
          <div class="settings-header">OSC Output</div>
          <label class="toggle">
            <input type="checkbox" id="oscToggle" checked />
            <span>Enable</span>
          </label>
          <div class="setting-row">
            <label>IP</label>
            <input type="text" id="oscIp" value="127.0.0.1" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>Port</label>
            <input type="number" id="oscPort" value="9000" min="1" max="65535" class="setting-input setting-input-short" />
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-header">Parameter Names</div>
          <div class="setting-row">
            <label>HR</label>
            <input type="text" id="param-hr" value="HR" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>onesHR</label>
            <input type="text" id="param-ones_hr" value="onesHR" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>tensHR</label>
            <input type="text" id="param-tens_hr" value="tensHR" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>hundredsHR</label>
            <input type="text" id="param-hundreds_hr" value="hundredsHR" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>isHRConnected</label>
            <input type="text" id="param-is_hr_connected" value="isHRConnected" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>isHRActive</label>
            <input type="text" id="param-is_hr_active" value="isHRActive" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>isHRBeat</label>
            <input type="text" id="param-is_hr_beat" value="isHRBeat" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>HRPercent</label>
            <input type="text" id="param-hr_percent" value="HRPercent" class="setting-input" />
          </div>
          <div class="setting-row">
            <label>FullHRPercent</label>
            <input type="text" id="param-full_hr_percent" value="FullHRPercent" class="setting-input" />
          </div>
          <button id="saveParamsBtn" class="btn btn-primary btn-full">Save Parameters</button>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-settings">
      <div class="settings-scroll">
        <div class="settings-section">
          <div class="settings-header">General</div>
          <p class="setting-placeholder">Coming soon...</p>
        </div>
      </div>
    </div>

    <div class="tab-content" id="tab-log">
      <div class="log-toolbar">
        <button id="clearLogBtn" class="btn btn-small">Clear</button>
      </div>
      <div class="log-container" id="logContainer"></div>
    </div>

    <div id="status" class="status">Ready</div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
